<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast - Weather App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        input { padding: 10px; width: 70%; border: 1px solid #ccc; border-radius: 5px; margin-right: 5px; }
        button { padding: 10px 15px; border: none; background: #007bff; color: white; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .weather-info { margin-top: 20px; display: none; }
        .error { color: red; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>SkyCast Weather</h2>
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Masukkan nama kota...">
        <button id="searchBtn">Cari</button>
    </div>
    
    <p class="error" id="errorMsg">Kota tidak ditemukan!</p>

    <div class="weather-info" id="weatherInfo">
        <h3 id="cityName">Nama Kota</h3>
        <img id="weatherIcon" src="" alt="Icon Cuaca">
        <h1 id="temp">0°C</h1>
        <p id="description">Kondisi</p>
        <p>Kelembapan: <span id="humidity">0</span>%</p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
